apiVersion: v1
kind: Secret
metadata:
  name: orchard-secrets
  namespace: orchard
  labels:
    app.kubernetes.io/part-of: orchard
type: Opaque
data:
  # DO NOT fill in real values here — this file is a reference only.
  # Apply secrets imperatively so they are never committed to source control:
  #
  #   kubectl create secret generic orchard-secrets -n orchard \
  #     --from-literal=OPENAI_API_KEY="sk-..." \
  #     --from-literal=TAVILY_API_KEY="tvly-..." \
  #     --from-literal=HF_TOKEN="hf_..."
  #
  # To generate a base64 placeholder: echo -n "your-value" | base64
  OPENAI_API_KEY: ""
  TAVILY_API_KEY: ""
  HF_TOKEN: ""
