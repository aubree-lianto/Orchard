---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: orchard
  labels:
    app: gateway
    app.kubernetes.io/part-of: orchard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          # Build and push before deploying:
          #   docker build -f Dockerfile.gateway -t <your-registry>/orchard-gateway:latest .
          #   docker push <your-registry>/orchard-gateway:latest
          image: <your-registry>/orchard-gateway:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          env:
            - name: MODEL_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: orchard-config
                  key: MODEL_PROVIDER

            - name: MODEL_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: orchard-config
                  key: MODEL_BASE_URL

            # Read directly by VLLMModelClient via os.getenv (inference/model_client.py:139)
            - name: VLLM_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: orchard-config
                  key: VLLM_SERVER_URL

            # Read directly by MockModelClient via os.getenv (inference/model_client.py:33)
            - name: MOCK_MODEL_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: orchard-config
                  key: MOCK_MODEL_SERVER_URL

            - name: PYTHONPATH
              valueFrom:
                configMapKeyRef:
                  name: orchard-config
                  key: PYTHONPATH

            - name: ARXIV_MAX_RESULTS
              valueFrom:
                configMapKeyRef:
                  name: orchard-config
                  key: ARXIV_MAX_RESULTS

            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: orchard-secrets
                  key: OPENAI_API_KEY
                  optional: true

            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: orchard-secrets
                  key: TAVILY_API_KEY
                  optional: true

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
            timeoutSeconds: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: gateway-svc
  namespace: orchard
  labels:
    app: gateway
    app.kubernetes.io/part-of: orchard
spec:
  selector:
    app: gateway
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
