---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-server
  namespace: orchard
  labels:
    app: mock-server
    app.kubernetes.io/part-of: orchard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-server
  template:
    metadata:
      labels:
        app: mock-server
    spec:
      containers:
        - name: mock-server
          # Build and push before deploying:
          #   docker build -f Dockerfile.server -t <your-registry>/orchard-mock-server:latest .
          #   docker push <your-registry>/orchard-mock-server:latest
          image: <your-registry>/orchard-mock-server:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          env:
            - name: PYTHONPATH
              value: "/app"

          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"

          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 10
            timeoutSeconds: 2

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 3

          # mock_server.py has no /ready endpoint — use /health for readiness too
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3

---
apiVersion: v1
kind: Service
metadata:
  name: mock-server-svc
  namespace: orchard
  labels:
    app: mock-server
    app.kubernetes.io/part-of: orchard
spec:
  selector:
    app: mock-server
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
